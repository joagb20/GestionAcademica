<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="card auth-card shadow-lg border-0">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <div class="brand-badge">GA</div>
                            <h2 class="fw-bold mt-3 mb-2">Gestión Académica</h2>
                            <p class="text-muted">Accede al panel institucional</p>
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                                Credenciales inválidas.
                            </div>

                            <div class="mb-3">
                                <label for="correo" class="form-label">Correo de acceso</label>
                                <input type="text" class="form-control" id="correo" name="correo" required placeholder="profesor@universidad.edu">
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
