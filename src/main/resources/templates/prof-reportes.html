<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reporte Académico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/profesor/dashboard}">Gestión Académica</a>
        <div class="ms-auto">
            <a class="nav-link text-danger fw-semibold" th:href="@{/logout}">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="dashboard-shell">
        <aside class="dashboard-sidebar">
            <h3>Docente</h3>
            <a th:href="@{/profesor/dashboard}">Mi panel</a>
            <a th:href="@{/profesor/registrar-notas}">Registrar notas</a>
            <a class="active" th:href="@{/profesor/reportes}">Reportes</a>
        </aside>

        <main class="dashboard-main">
            <div class="dashboard-topbar">
                <div>
                    <h1>Seguimiento académico</h1>
                    <p class="text-muted mb-0">Se muestran los estados de los estudiantes asignados a tus clases, sin opciones de edición.</p>
                </div>
            </div>

            <div class="dashboard-card">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Código de matrícula</th>
                        <th>Estado</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${reporte}">
                        <td class="ps-4 fw-bold" th:text="${entry.key}"></td>
                        <td>
                            <span th:class="${entry.value == 'APROBADO'} ? 'badge bg-success' : 'badge bg-danger'"
                                  th:text="${entry.value}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#maps.isEmpty(reporte)}">
                        <td colspan="2" class="text-center py-3 text-muted">No hay estudiantes registrados o con notas procesadas.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>
</body>
</html>
