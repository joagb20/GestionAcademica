<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asignar Alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">Gestión Académica</a>
        <div class="ms-auto">
            <a class="nav-link text-danger fw-semibold" th:href="@{/logout}">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="dashboard-shell">
        <aside class="dashboard-sidebar">
            <h3>Operaciones</h3>
            <a th:href="@{/admin/dashboard}">Resumen institucional</a>
            <a th:href="@{/admin/registrar-profesor}">Agregar profesor</a>
            <a th:href="@{/admin/crear-curso}">Añadir clase</a>
            <a class="active" th:href="@{/admin/asignar-estudiantes}">Asignar alumnos</a>
        </aside>

        <main class="dashboard-main">
            <div class="dashboard-topbar">
                <div>
                    <h1>Asignar alumnos a la clase</h1>
                    <p class="text-muted mb-0">Relaciona a los estudiantes con el curso que el docente dicta.</p>
                </div>
            </div>

            <div class="dashboard-card">
                <form th:action="@{/admin/asignar-estudiantes}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Clase</label>
                        <select class="form-select" name="cursoId">
                            <option th:each="curso : ${cursos}" th:value="${curso.id}" th:text="${curso.nombre + ' · ' + curso.profesor.nombre}"></option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Estudiante</label>
                        <select class="form-select" name="estudianteId">
                            <option th:each="estudiante : ${estudiantes}" th:value="${estudiante.id}" th:text="${estudiante.nombre + ' · ' + estudiante.codigoMatricula}"></option>
                        </select>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Volver</a>
                        <button type="submit" class="btn btn-primary">Asignar alumno</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>
</body>
</html>
