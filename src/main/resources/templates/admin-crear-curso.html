<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Nuevo Curso</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-container { max-width: 500px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .porcentajes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <h2>Crear Clase y Estructura de Evaluación</h2>
    
    <div class="form-container">
        <form th:action="@{/admin/crear-curso}" method="post">
            
            <div class="form-group">
                <label>Nombre del Curso:</label>
                <input type="text" name="nombre" required />
            </div>

            <div class="form-group">
                <label>Código del Curso:</label>
                <input type="text" name="codigo" required />
            </div>

            <div class="form-group">
                <label>Profesor Asignado:</label>
                <select name="profesorId" required>
                    <option value="" disabled selected>Seleccione un docente...</option>
                    <option th:each="prof : ${profesores}" th:value="${prof.id}" th:text="${prof.nombre}"></option>
                </select>
            </div>

            <hr>
            <h3>Configuración de Porcentajes (%)</h3>
            <p style="font-size: 0.9em; color: #555;">La suma debe representar el 100% de la nota final.</p>
            
            <div class="porcentajes-grid">
                <div class="form-group">
                    <label>Peso PC1:</label>
                    <input type="number" step="0.1" name="porcentajePc1" required placeholder="Ej: 20" />
                </div>
                <div class="form-group">
                    <label>Peso PC2:</label>
                    <input type="number" step="0.1" name="porcentajePc2" required placeholder="Ej: 20" />
                </div>
                <div class="form-group">
                    <label>Peso Parcial:</label>
                    <input type="number" step="0.1" name="porcentajeParcial" required placeholder="Ej: 30" />
                </div>
                <div class="form-group">
                    <label>Peso Final:</label>
                    <input type="number" step="0.1" name="porcentajeFinal" required placeholder="Ej: 30" />
                </div>
            </div>

            <div class="form-group">
                <label>Descripción / Silabo (Opcional):</label>
                <textarea name="descripcion" rows="3"></textarea>
            </div>

            <button type="submit">Crear Curso</button>
        </form>
    </div>
    
    <br>
    <a th:href="@{/admin/dashboard}">Volver al Dashboard</a>
</body>
</html>
