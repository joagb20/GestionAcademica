<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Profesor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">Gestión Académica</a>
        <div class="ms-auto">
            <a class="nav-link text-danger fw-semibold" th:href="@{/logout}">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="dashboard-shell">
        <aside class="dashboard-sidebar">
            <h3>Operaciones</h3>
            <a th:href="@{/admin/dashboard}">Resumen institucional</a>
            <a class="active" th:href="@{/admin/registrar-profesor}">Agregar profesor</a>
            <a th:href="@{/admin/crear-curso}">Añadir clase</a>
            <a th:href="@{/admin/asignar-estudiantes}">Asignar alumnos</a>
        </aside>

        <main class="dashboard-main">
            <div class="dashboard-topbar">
                <div>
                    <h1>Registrar docente</h1>
                    <p class="text-muted mb-0">Completa los datos del profesor para habilitar su acceso.</p>
                </div>
            </div>

            <div class="dashboard-card">
                <form th:action="@{/admin/registrar-profesor}" th:object="${profesor}" method="post">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña temporal</label>
                        <input type="password" class="form-control" id="password" th:field="*{password}" required>
                    </div>
                    <div class="mb-4">
                        <label for="clase" class="form-label">Asignatura o clase</label>
                        <input type="text" class="form-control" id="clase" th:field="*{clase}" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Volver</a>
                        <button type="submit" class="btn btn-primary">Guardar profesor</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>
</body>
</html>
