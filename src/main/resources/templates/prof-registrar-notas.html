<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Clase y Registro de Notas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .nota-input { width: 70px; padding: 5px; }
        .btn-guardar { background-color: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-guardar:hover { background-color: #0056b3; }
        .alerta-exito { color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: 10px; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>Registro de Notas</h2>
    <h3>Clase: <span th:text="${curso.nombre}">Nombre del Curso</span> (<span th:text="${curso.codigo}">COD</span>)</h3>
    
    <!-- Muestra el mensaje de éxito si las notas se guardaron bien -->
    <div th:if="${mensajeExito}" class="alerta-exito" th:text="${mensajeExito}"></div>

    <table>
        <thead>
            <tr>
                <th>Estudiante</th>
                <!-- Muestra los porcentajes dinámicos configurados al crear el curso -->
                <th>PC1 (<span th:text="${curso.porcentajePc1}"></span>%)</th>
                <th>PC2 (<span th:text="${curso.porcentajePc2}"></span>%)</th>
                <th>Parcial (<span th:text="${curso.porcentajeParcial}"></span>%)</th>
                <th>Final (<span th:text="${curso.porcentajeFinal}"></span>%)</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <!-- Itera sobre todos los estudiantes asignados a esta clase -->
            <tr th:each="est : ${estudiantes}">
                <form th:action="@{/profesor/guardarNota}" method="post">
                    <!-- Datos ocultos necesarios para el backend -->
                    <input type="hidden" name="cursoId" th:value="${curso.id}" />
                    <input type="hidden" name="estudianteId" th:value="${est.id}" />
                    
                    <td th:text="${est.nombre}">Nombre Estudiante</td>
                    
                    <!-- Entradas para las notas -->
                    <td><input type="number" step="0.1" min="0" max="20" name="notaPc1" class="nota-input" placeholder="0 - 20" /></td>
                    <td><input type="number" step="0.1" min="0" max="20" name="notaPc2" class="nota-input" placeholder="0 - 20" /></td>
                    <td><input type="number" step="0.1" min="0" max="20" name="notaParcial" class="nota-input" placeholder="0 - 20" /></td>
                    <td><input type="number" step="0.1" min="0" max="20" name="notaFinal" class="nota-input" placeholder="0 - 20" /></td>
                    
                    <td><button type="submit" class="btn-guardar">Guardar</button></td>
                </form>
            </tr>
            <tr th:if="${#lists.isEmpty(estudiantes)}">
                <td colspan="6" style="text-align: center;">No hay estudiantes asignados a este curso todavía.</td>
            </tr>
        </tbody>
    </table>
    
    <br><br>
    <a th:href="@{/profesor/dashboard}">← Volver al Panel de Profesor</a>

</body>
</html>
